<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preamble Template | Hype For Types</title>

    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/contrib/auto-render.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "\\(", right: "\\)", display: false},
                    {left: "\\[", right: "\\]", display: true},
                ]
            });
        });
    </script>

    <!-- Project Styles -->
    <link rel="stylesheet" href="../../base.css">
    <link rel="stylesheet" href="../chapter.css">
    <link rel="stylesheet" href="../atom.css">
    <script src="../notes.js"></script>
</head>
<body>
    <nav style="margin-bottom: 20px;">
        <a href="../../index.html" style="text-decoration: none;">&larr; Home</a> | 
        <a href="../index.html" style="text-decoration: none;">Course Notes Index</a>
    </nav>

    <h1>Preamble Title</h1>
    <p><strong>MODULE X:</strong> Module Name</p>
    <hr>

    <main>
        <div id="chapter-atoms">
            <div class="block-container">
                <div class="block block-plain-kind block-gram">
                    <div class="atom-body-container">
                        <div class="atom-body">
                            <p>This is a preamble template. Use it for introductory content.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
